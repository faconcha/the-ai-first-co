weights:
  seo: 0.25              # Strongest predictor of search-focused company
  visibility_gap: 0.20   # The actual problem size we solve
  google_ads: 0.15       # Paid search investment = budget + search focus
  linkedin_jobs: 0.15    # Growth trajectory, buying readiness
  content: 0.10          # Content maturity
  meta_ads: 0.10         # Marketing budget breadth
  youtube: 0.05          # Soft brand signal

thresholds:
  hot: 70
  warm: 40

# ---------------------------------------------------------------------------
# Per-signal scoring parameters
# ---------------------------------------------------------------------------
# "anchors" define piecewise linear curves: [[input_value, output_score], ...]
# The scorer interpolates linearly between anchor points.
# "tiers" define step functions: [[threshold, bonus], ...]
# The scorer returns the bonus of the highest exceeded threshold.

google_ads:
  # Primary driver: estimated_paid_cost_usd
  anchors:                    # $0→0, $100→15, $1K→40, $10K→70, $100K+→95
    - [0, 0]
    - [100, 15]
    - [1000, 40]
    - [10000, 70]
    - [100000, 95]
  keyword_bonus_per: 0.1      # Points per paid keyword
  keyword_bonus_max: 5.0

meta_ads:
  cap: 80                     # No spend data available, honest cap
  # Primary driver: ad_count
  anchors:
    - [0, 0]
    - [5, 40]
    - [10, 60]
  platform_bonus_per: 10      # Points per additional platform beyond first
  platform_bonus_max: 20

seo:
  # Primary driver: organic_traffic_value_usd
  anchors:                    # $500→15, $5K→35, $50K→60, $500K+→80
    - [0, 0]
    - [500, 15]
    - [5000, 35]
    - [50000, 60]
    - [500000, 80]
  trend_multiplier: 50        # Scales trend_ratio to score modifier
  trend_max: 10               # Max absolute trend modifier (+-10)
  breadth_bonus_per: 0.001    # Points per keyword (1/1000)
  breadth_bonus_max: 5.0

content:
  cap: 70                     # Single crude metric (blog_pages)
  # Primary driver: blog_pages
  anchors:
    - [0, 0]
    - [10, 25]
    - [50, 45]
    - [200, 60]

linkedin_jobs:
  # Hiring velocity piecewise
  velocity_anchors:           # 10 positions→30, 30+→45
    - [0, 0]
    - [10, 30]
    - [30, 45]
  marketing_hiring_bonus: 25  # Flag: actively hiring marketing
  role_bonus_per: 2           # Points per marketing role
  role_bonus_max: 10
  exec_bonus: 20              # Executive-level role detected
  exec_keywords:
    - cmo
    - ceo
    - cto
    - coo
    - vp
    - chief
    - president
    - director
    - head of
    - gerente general
    - vicepresidente
    - subgerente
    - gerente

youtube:
  cap: 55                     # Approximate counts, poor data quality
  # Video count piecewise
  video_anchors:
    - [0, 0]
    - [10, 20]
    - [50, 30]
  # Step functions for engagement bonuses
  views_tiers:                # [threshold, bonus]
    - [1000, 5]
    - [10000, 10]
    - [100000, 15]
  comments_tiers:
    - [10, 2]
    - [100, 5]

visibility_gap:
  default_score: 50           # When no data available
  max_score: 95.0             # Multiplier for inverse curve
  power_exponent: 1.3         # Curve shape: 95 * (1 - rate) ^ 1.3
  citation_mention_min: 0.1   # Minimum mention rate to check citation gap
  citation_gap_threshold: 0.2 # Gap between mention and citation rates
  citation_gap_bonus: 5       # Bonus when mentioned but poorly cited

